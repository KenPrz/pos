# infra/docker-compose.yml — retired.
#
# This was the standalone Postgres-only compose for native dev (artisan serve +
# npm run dev, DB in a container). As of M7, the full dev stack — db, api, web,
# back-office — lives in one place: `compose.dev.yml` at the repo root, driven
# by `make dev`.
#
# If you're still running the old `pos-postgres` container from this file on
# this machine, it's fine to leave it up — nothing here forces a switch. When
# you're ready, `docker compose -f infra/docker-compose.yml down` and use
# `make dev` instead.
#
# infra/.env* are untouched and still apply if you bring this file back up.
