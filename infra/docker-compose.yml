# infra/docker-compose.yml — retired.
#
# This was the standalone Postgres-only compose for native dev (artisan serve +
# npm run dev, DB in a container). As of M7, the full dev stack — db, api, web,
# back-office — lives in one place: `compose.dev.yml` at the repo root, driven
# by `make dev`.
#
# If you're still running the old `pos-postgres` container from this file on
# this machine, it's fine to leave it up — nothing here forces a switch. When
# you're ready to tear it down: this file's OWN `docker compose ... down` is a
# silent no-op now — it no longer carries `name: pos` (see compose.prod.yml's
# note on why that name is claimed elsewhere), so a plain `down` resolves to
# project `infra` and stops nothing; the real container still lives under
# project `pos`. Use the project name explicitly instead:
#   docker compose -p pos -f infra/docker-compose.yml down
# or, the blunt fallback if that ever stops matching reality:
#   docker rm -f pos-postgres; docker volume rm pos_pgdata
# Then use `make dev` instead.
#
# infra/.env* are untouched and still apply if you bring this file back up.

# `services: {}` (not just comments): a Compose file with nothing but comments
# is invalid — both `up` and this file's own suggested `down` fail on it
# ("empty compose file"). An explicit empty services map keeps both commands
# a graceful no-op instead.
services: {}
