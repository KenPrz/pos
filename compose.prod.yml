# compose.prod.yml — single-host production: one FrankenPHP edge, TLS, host routing.
# Requires an .env beside this file — see .env.prod.example. `make prod-up`.
#
# `name: pos` claims the Docker volume/network namespace `pos_*` outright. If
# this host ever ran the old `infra/docker-compose.yml` (retired, but its
# project name was also `pos`) or any other stack named `pos`, its `pgdata`
# volume is the same `pos_pgdata` this file's `db` service will attach to —
# a real Postgres, not a fresh one. Before a real boot here, either
# `docker compose -f infra/docker-compose.yml down -v` first, or, for a
# throwaway/smoke run only, boot with `COMPOSE_PROJECT_NAME=<something-else>`
# to get an isolated namespace instead.
name: pos

services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pos
      POSTGRES_USER: pos
      POSTGRES_PASSWORD: ${POS_DB_PASSWORD:?}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos -d pos"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: { context: backend, target: prod }
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${POS_APP_KEY:?}
      APP_URL: https://${POS_REGISTER_DOMAIN:?}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: pos
      DB_USERNAME: pos
      DB_PASSWORD: ${POS_DB_PASSWORD:?}
      MIGRATE_ON_BOOT: ${POS_MIGRATE_ON_BOOT:-1}
      POS_CURRENCY: ${POS_CURRENCY:?}
      POS_BUSINESS_NAME: ${POS_BUSINESS_NAME:?}
      POS_BUSINESS_ADDRESS: ${POS_BUSINESS_ADDRESS:-}
      POS_BUSINESS_TAX_ID: ${POS_BUSINESS_TAX_ID:-}
      POS_REGISTER_DOMAIN: ${POS_REGISTER_DOMAIN:?}
      POS_ADMIN_DOMAIN: ${POS_ADMIN_DOMAIN:?}
      POS_TLS_ISSUER: ${POS_TLS_ISSUER:-acme}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  web:
    build: { context: frontend/web, target: runner }
    restart: unless-stopped

  back-office:
    build: { context: frontend/back-office, target: runner }
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
