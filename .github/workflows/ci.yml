name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Pest + Postgres)
    runs-on: ubuntu-latest

    # Real Postgres, never SQLite. We depend on partial unique indexes,
    # SELECT ... FOR UPDATE, jsonb and uuidv7() — SQLite silently lacks all of them, so a
    # green SQLite suite would mislead about our concurrency invariants.
    # See docs/01-architecture.md.
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: pos_test
          POSTGRES_USER: pos
          POSTGRES_PASSWORD: pos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pos -d pos_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo_pgsql, pgsql, mbstring, bcmath, intl
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      # .env must exist before composer install: post-autoload-dump runs
      # `artisan package:discover`, which boots the app into the required-config
      # guard (AppServiceProvider). key:generate needs vendor/, so it comes after.
      - run: cp .env.example .env

      - run: composer install --no-interaction --prefer-dist --no-progress

      - run: php artisan key:generate

      - name: Migrate
        run: php artisan migrate --force
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_DATABASE: pos_test
          DB_USERNAME: pos
          DB_PASSWORD: pos

      # Includes tests/Arch — the conventions in docs/04-backend-conventions.md are
      # enforced here rather than in review.
      - name: Pest
        run: ./vendor/bin/pest --ci

  frontend:
    name: Frontend (tsc + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/web

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - run: npx oxlint src

      # The money primitives are tested on both sides of the wire. If the two parsers
      # ever disagree, a price typed in the back office is not the price rung up.
      - name: Vitest
        run: npm run test

      - run: npm run build

  back-office:
    name: Back office (tsgo + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/back-office

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/back-office/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - run: npx oxlint src

      - name: Vitest
        run: npm run test

      - run: npm run build

  docker-build:
    name: Docker images build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      # Prod images only — the point is that the Dockerfiles stay honest.
      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: backend
          target: prod
          push: false
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build register image
        uses: docker/build-push-action@v6
        with:
          context: frontend/web
          target: runner
          push: false
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

      - name: Build back-office image
        uses: docker/build-push-action@v6
        with:
          context: frontend/back-office
          target: runner
          push: false
          cache-from: type=gha,scope=bo
          cache-to: type=gha,scope=bo,mode=max
