# compose.dev.yml — the full dev stack: `make dev`.
# Native dev (artisan serve + npm run dev + any Postgres) remains fully supported.
name: pos-dev

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: pos
      POSTGRES_USER: pos
      POSTGRES_PASSWORD: ${POS_DEV_DB_PASSWORD:-pos}
    ports:
      - "${POS_DEV_DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos -d pos"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: { context: backend, target: dev }
    # Dev-only: the image's `USER pos` (Dockerfile) can't write into a freshly
    # created named volume — Docker creates api_vendor root-owned, and
    # `composer install` then fails with "vendor/... could not be created".
    # Root here only touches the anonymous vendor volume, never the host bind
    # mount; prod (Task 5) keeps the non-root user.
    user: root
    depends_on:
      db: { condition: service_healthy }
    environment:
      APP_ENV: local
      APP_KEY: ${POS_DEV_APP_KEY:?run 'make dev-key' once and put it in .env}
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: pos
      DB_USERNAME: pos
      DB_PASSWORD: ${POS_DEV_DB_PASSWORD:-pos}
      POS_CURRENCY: USD
      POS_BUSINESS_NAME: "Dev Trading Co"
    ports:
      # ${POS_DEV_API_PORT:-8000} — override when 8000 is already held on the host
      # (e.g. a native `php artisan serve` from an earlier session).
      - "${POS_DEV_API_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - api_vendor:/app/vendor
    # Bind mount hides the image's vendor; install on boot if absent, then serve.
    command: ["sh", "-c", "composer install --no-interaction && exec entrypoint.sh frankenphp run --config /etc/frankenphp/Caddyfile"]

  web:
    build: { context: frontend/web, target: dev }
    # Dev-only: see api's `user: root` note — same root-owned fresh named
    # volume problem, here for web_node_modules.
    user: root
    environment:
      API_ORIGIN: http://api:8000
      PORT: 5174
    ports:
      # ${POS_DEV_WEB_PORT:-5174} — override when 5174 is already held on the host.
      - "${POS_DEV_WEB_PORT:-5174}:5174"
    volumes:
      - ./frontend/web:/app
      - web_node_modules:/app/node_modules
    command: ["sh", "-c", "npm install && npm run dev"]

  back-office:
    build: { context: frontend/back-office, target: dev }
    # Dev-only: see api's `user: root` note — same root-owned fresh named
    # volume problem, here for bo_node_modules.
    user: root
    environment:
      API_ORIGIN: http://api:8000
      PORT: 5175
    ports:
      # ${POS_DEV_BACKOFFICE_PORT:-5175} — override when 5175 is already held on
      # the host (e.g. a native `npm run dev` from an earlier session).
      - "${POS_DEV_BACKOFFICE_PORT:-5175}:5175"
    volumes:
      - ./frontend/back-office:/app
      - bo_node_modules:/app/node_modules
    command: ["sh", "-c", "npm install && npm run dev"]

volumes:
  pgdata:
  api_vendor:
  web_node_modules:
  bo_node_modules:
